name: "вҡЎ SIGNAL MONITOR"

on:
  schedule:
    - cron: '0 0 * * *'  # Every day at midnight UTC
  push:
    branches: [main]
  workflow_dispatch:  # Manual trigger

permissions:
  contents: read

jobs:
  signal-scan:
    name: "рҹ“Ў Scanning for signal..."
    runs-on: ubuntu-latest
    
    steps:
      - name: "рҹ”“ Decrypt transmission"
        uses: actions/checkout@v4

      - name: "вҡЎ Signal Analysis"
        run: |
          echo ""
          echo "в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—"
          echo "в•‘         S I G N A L   M O N I T O R         в•‘"
          echo "в•‘         yotsingularity // $(date +%Y.%m.%d)        в•‘"
          echo "в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ"
          echo ""
          
          TRANSMISSIONS=$(find transmissions/ -name "*.md" 2>/dev/null | wc -l)
          RESEARCH=$(find research/ -name "*.md" 2>/dev/null | wc -l)
          DOCS=$(find docs/ -name "*.md" 2>/dev/null | wc -l)
          TOTAL=$((TRANSMISSIONS + RESEARCH + DOCS))
          
          echo "> SIGNAL STATUS:    ACTIVE"
          echo "> TIMESTAMP:        $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "> TRANSMISSIONS:    $TRANSMISSIONS"
          echo "> RESEARCH NODES:   $RESEARCH"
          echo "> DOCUMENTATION:    $DOCS"
          echo "> TOTAL SIGNALS:    $TOTAL"
          echo ""
          
          # Signal strength bar
          if [ $TOTAL -lt 10 ]; then
            BAR="в–Ҳв–Ҳв–Ҳв–Ҳв–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘"
          elif [ $TOTAL -lt 20 ]; then
            BAR="в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘"
          elif [ $TOTAL -lt 30 ]; then
            BAR="в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–‘в–‘в–‘в–‘"
          else
            BAR="в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳ"
          fi
          echo "> SIGNAL STRENGTH:  [$BAR]"
          echo ""
          
          echo "в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ"
          echo "  LATEST TRANSMISSIONS"
          echo "в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ"
          ls -t transmissions/*.md 2>/dev/null | head -5 | while read f; do
            TITLE=$(head -1 "$f" | sed 's/# //' | sed 's/`//g')
            echo "  вҶ’ $TITLE"
          done
          echo ""
          
          echo "в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ"
          echo "  RESEARCH DOMAINS"
          echo "в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ"
          for dir in research/*/; do
            if [ -d "$dir" ]; then
              DOMAIN=$(basename "$dir" | tr '-' ' ' | tr '[:lower:]' '[:upper:]')
              COUNT=$(find "$dir" -name "*.md" | wc -l)
              echo "  в—Ҷ $DOMAIN [$COUNT files]"
            fi
          done
          echo ""
          
          echo "> MONITORING: CONTINUOUS"
          echo "> NEXT SCAN: $(date -u -d '+1 day' '+%Y-%m-%d %H:%M UTC' 2>/dev/null || date -u -v+1d '+%Y-%m-%d %H:%M UTC' 2>/dev/null || echo 'T+24H')"
          echo ""
          echo "// The convergence continues."

      - name: "рҹ§° Prepare Node"
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: "рҹ§ӯ Source freshness"
        run: node scripts/trust-check.mjs --ci --freshness
